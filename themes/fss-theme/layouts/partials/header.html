<header class="site-header">
  <div class="container">
    <div class="header-content">

      <div class="logo-container">
        <a href="{{ "/" | relURL }}" aria-label="{{ .Site.Title }}">
          <img
            src="{{ .Site.Params.logo }}"
            alt="{{ .Site.Params.logoAlt | default .Site.Title }}"
            class="logo"
            width="180" height="auto"
            loading="eager">
        </a>
        <div class="brand-name">
          <span class="brand-title">{{ .Site.Title }}</span>
          <p class="brand-tagline">{{ .Site.Params.tagline | default "Desde 1995" }}</p>
        </div>
      </div>

      <button
        class="menu-toggle"
        aria-label="Abrir menú de navegación"
        aria-expanded="false"
        aria-controls="main-nav">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav id="main-nav" aria-label="Navegación principal">
        {{- range .Site.Menus.main }}
        <a
          href="{{ .URL }}"
          {{- if eq $.RelPermalink .URL }} aria-current="page"{{ end }}>
          {{ .Name }}
        </a>
        {{- end }}
      </nav>

    </div>
  </div>
</header>
